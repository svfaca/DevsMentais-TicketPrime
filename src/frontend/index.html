<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>TicketPrime</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="home-page">
    <!-- ═══════════════ header ═══════════════ -->
    <header class="site-navbar">
      <div class="navbar-logo">
        <img src="./imagens/logo.png" alt="Logo TicketPrime" class="logo-img" />
        <span>TicketPrime</span>
      </div>
      <nav class="navbar-links">
        <a href="./paginas/login.html" class="navbar-btn">Cadastro</a>
        <a href="./paginas/login.html" class="navbar-btn">Login</a>
        <a href="./paginas/admin.html" class="navbar-btn">Criar Evento</a>
      </nav>
    </header>

    <!-- ═══════════════ main ═══════════════ -->
    <main class="site-main">
      <!-- ═══════════════ hero section ═══════════════ -->
      <section class="hero-section" id="hero-section">
        <div class="hero-container" id="hero-container">
          <!-- Hero dinâmico gerado pelo JS -->
        </div>
        <!-- Navegação do hero -->
        <button class="hero-control hero-prev" type="button" aria-label="Evento anterior">
          <i class="bx bx-chevron-left"></i>
        </button>
        <button class="hero-control hero-next" type="button" aria-label="Próximo evento">
          <i class="bx bx-chevron-right"></i>
        </button>
        <!-- Indicadores -->
        <div class="hero-dots" id="hero-dots" aria-label="Indicadores de eventos"></div>
      </section>

      <!-- ═══════════════ events grid section ═══════════════ -->
      <section class="events-grid-section">
        <h2 class="section-title">Próximos Eventos</h2>
        <div class="events-grid" id="events-grid">
          <!-- eventos carregados dinamicamente -->
        </div>
      </section>
    </main>
    <!-- ═══════════════ footer ═══════════════ -->
    <footer class="site-footer">
      <div class="footer-column">
        <h3>Endereço</h3>
        <p>Av. Paulista, 1000, São Paulo - SP, 01310-100</p>
      </div>
      <div class="footer-column">
        <h3>Contato</h3>
        <p>Tel: (11) 4000-1234</p>
        <p>WhatsApp: (11) 99999-9999</p>
      </div>
      <div class="footer">
        <h3>Suporte</h3>
        <p>suporte@ticketprime.com.br</p>
      </div>
      <p class="footer-copy">
        © 2026 TicketPrime Eventos. Todos os direitos reservados.
      </p>
    </footer>
    <script type="module" src="./js/events-hero.js"></script>
  </body>
</html>
