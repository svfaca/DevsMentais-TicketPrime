<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>Login - TicketPrime</title>
		<link rel="stylesheet" href="../style.css" />
		<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
	</head>
	<body class="login-page">
		<div class="wrapper">
			<form id="loginForm">
				<h1>TicketPrime - Login</h1>
				<div class="input-box">
					<input id="usuario" type="text" placeholder="CPF ou E-mail" required />
					<i class="bx bxs-user"></i>
				</div>
				<div class="input-box">
					<input id="senha" type="password" placeholder="Senha" required />
					<i class="bx bxs-lock-alt"></i>
				</div>
				<div id="loginMessage" class="login-message"></div>
				<div class="remember-forgot">
					<label><input type="checkbox" /> Lembrar-me </label>
					<a href="#" id="forgotPasswordLink">Esqueceu a senha?</a>
				</div>
				<button type="submit" class="btn">Entrar</button>
				<div class="register-link">
					<p><a href="home.html">Ir para painel administrador</a></p>
				</div>
			</form>
		</div>

		<script>
			const loginForm = document.getElementById('loginForm');
			const loginMessage = document.getElementById('loginMessage');
			loginForm.addEventListener('submit', (event) => {
				event.preventDefault();
				loginMessage.textContent = 'Login simulado. Redirecionando...';
				loginMessage.className = 'login-message success';
				setTimeout(() => window.location.href = 'home.html', 800);
			});
		</script>
	</body>
</html>
